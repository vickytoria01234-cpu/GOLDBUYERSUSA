paths:
  /notification/deposit:
    x-swagger-router-controller: notification
    post:
      operationId: handleCurrencyDeposit
      description: Deposit notification
      tags:
        - Notification
      parameters:
        - name: currency
          description: currency name
          in: query
          required: true
          type: string
          maxLength: 256
        - name: data
          description: Deposit transaction info
          in: body
          required: true
          schema:
            $ref: "#/definitions/ExternalDepositRequest"
      responses:
        200:
          description: Success
          schema:
            $ref: "#/definitions/MessageResponse"
        default:
          description: Error
          schema:
            $ref: "#/definitions/MessageResponse"
  /notification/deposit/check:
    x-swagger-router-controller: notification
    post:
      operationId: checkDepositAddresses
      description: Check deposit source addresses against the address blacklist
      tags:
        - Notification
      parameters:
        - name: data
          description: Deposit source addresses to screen
          in: body
          required: true
          schema:
            type: object
            required:
              - addresses
            properties:
              addresses:
                type: array
                items:
                  type: string
              network:
                type: string
              currency:
                type: string
              amount:
                type: number
              txid:
                type: string
              user_id:
                type: number
      responses:
        200:
          description: Success
          schema:
            type: object
            properties:
              allowed:
                type: boolean
              blacklisted:
                type: array
                items:
                  type: string
        default:
          description: Error
          schema:
            $ref: "#/definitions/MessageResponse"
  /notification/withdrawal:
    x-swagger-router-controller: notification
    post:
      operationId: handleCurrencyWithdrawal
      description: Withdrawal notification
      tags:
        - Notification
      parameters:
        - name: currency
          description: currency name
          in: query
          required: true
          type: string
          maxLength: 256
        - name: data
          description: Withdrawal transaction info
          in: body
          required: true
          schema:
            $ref: "#/definitions/ExternalWithdrawalRequest"
      responses:
        200:
          description: Success
          schema:
            $ref: "#/definitions/MessageResponse"
        default:
          description: Error
          schema:
            $ref: "#/definitions/MessageResponse"
  /notification/apply:
    x-swagger-router-controller: notification
    get:
      operationId: applyKitChanges
      description: Reset kit to apply changes
      tags:
        - Notification
      responses:
        200:
          description: Success
          schema:
            $ref: "#/definitions/MessageResponse"
        default:
          description: Error
          schema:
            $ref: "#/definitions/MessageResponse"
